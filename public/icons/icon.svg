      <stop offset="0%" stop-color="#1B2B5B"/>
      <stop offset="60%" stop-color="#0077B6"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="30%" r="60%">
      <stop offset="0%" stop-color="rgba(72,202,228,0.55)"/>
      <stop offset="100%" stop-color="rgba(72,202,228,0)"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <g fill="#ffffff">
